# DATABASE_URL artık Render dashboard'da manuel olarak Neon connection string'i ile set ediliyor.
# Eski Render Postgres servisi (geodrill-db) kaldırıldı — bkz. CLAUDE.md "Deployment".

services:
  - type: web
    name: geodrill-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://geodrill-five.vercel.app,https://www.geodrillinsight.com,https://geodrillinsight.com
      # DATABASE_URL: Neon connection string — Render dashboard'da manuel set edilmeli.
      #   Format: postgresql://USER:PASS@HOST/DB?sslmode=require
