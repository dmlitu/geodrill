databases:
  - name: geodrill-db
    databaseName: geodrill
    user: geodrill
    plan: free

services:
  - type: web
    name: geodrill-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geodrill-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://SENIN_DOMAIN_ADRESI_BURAYA
